<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SENCI PRO SALITA</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
/* ❌ SACAMOS overflow:hidden */
}

/* 🔥 FONDO */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none; /* CLAVE */
}

/* 🔥 CONTENEDOR ARRIBA DE TODO */
.container{
display:flex;
gap:20px;
margin-top:50px;
align-items:flex-start;
justify-content:center;
flex-wrap:wrap;
position:relative;
z-index:10; /* 🔥 MUY IMPORTANTE */
}

/* PANEL */
.panel, .resultPanel{
width:300px;
max-width:90vw;
padding:15px;
border:2px solid #00eaff;
box-shadow:0 0 20px #00eaff;
color:#00eaff;
background:#000;
}

/* INPUT */
input{
width:100%;
padding:10px;
margin:5px 0;
background:#000;
border:1px solid #00eaff;
color:#00eaff;
}

/* FILA */
.row{
display:flex;
}

/* BOTONES */
button{
flex:1;
padding:10px;
margin:5px;
background:#000;
border:1px solid #00eaff;
color:#00eaff;
cursor:pointer;
transition:0.2s;
}

button:active{
transform:scale(0.95);
background:#00eaff;
color:#000;
}

button.active{
background:#00eaff;
color:#000;
}

/* DRAG */
.dragBtn{
border-color:red;
color:red;
}

/* 🌈 VIP */
#vipBtn{
position:fixed;
top:50%;
right:10px;
transform:translateY(-50%);
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
z-index:9999;

background:linear-gradient(45deg, red, orange, yellow, lime, cyan, blue, violet, red);
background-size:400% 400%;
animation:rainbow 5s linear infinite;

color:#000;
border:none;
box-shadow:0 0 20px white;
}

@keyframes rainbow{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* PANEL VIP */
#panelVIP{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:red;
z-index:99999;
padding:20px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="panel">
<h3>SENCI PRO SALITA</h3>

<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">

<div class="row">
<button onclick="setRango('ALTA',this)">ALTA</button>
<button onclick="setRango('MEDIA',this)">MEDIA</button>
<button onclick="setRango('BAJA',this)">BAJA</button>
</div>

<button onclick="activarDrag(this)" class="dragBtn">DRAG SHOT PRO</button>

<div class="row">
<button onclick="generar(true)">CON DPI</button>
<button onclick="generar(false)">SIN DPI</button>
</div>

</div>

<div class="resultPanel" id="resultado">
ESPERANDO DATOS...
</div>

</div>

<div id="vipBtn" onclick="abrirVIP()">VIP</div>

<div id="panelVIP">
<div id="vipResultado"></div>
</div>

<script>
let rango="ALTA";
let dragMode=false;
let autoInterval=null;

function setRango(r,btn){
rango=r;
document.querySelectorAll(".row button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function activarDrag(btn){
dragMode=!dragMode;
btn.classList.toggle("active");
}

function generar(dpi){

if(autoInterval) clearInterval(autoInterval);

function crear(){
let modelo=document.getElementById("modelo").value;
let resultado=document.getElementById("resultado");

let base=modelo.length*3 + Math.floor(Math.random()*10);

let sens={
general:180+base,
red:150+base,
x2:140+base,
x4:130+base,
boton:60+base
};

if(rango==="ALTA"){sens.general+=15;sens.red+=20;}
if(rango==="MEDIA"){sens.general+=5;}
if(rango==="BAJA"){sens.general-=10;}

if(dpi){sens.general+=5;}
if(dragMode){sens.red+=25;}

resultado.innerHTML=`
GENERAL: ${sens.general}<br>
ROJO: ${sens.red}<br>
X2: ${sens.x2}<br>
X4: ${sens.x4}<br>
BOTÓN: ${sens.boton}
<br><br>
⏳ Auto cada 5s
`;
}

crear();
autoInterval=setInterval(crear,5000);
}

/* VIP */
function abrirVIP(){
let p=prompt("Clave:");

if(p==="22"){
document.querySelector(".container").style.display="none";
document.getElementById("vipBtn").style.display="none";

let panelVIP=document.getElementById("panelVIP");
panelVIP.style.display="block";

document.getElementById("vipResultado").innerHTML=`
<h2>VIP PRO</h2>
GENERAL: 200<br>
ROJO: 190<br>
X2: 180<br>
X4: 170<br>
<br>
<button onclick="cerrarVIP()">SALIR</button>
`;
}else{
alert("Clave incorrecta");
}
}

function cerrarVIP(){
document.getElementById("panelVIP").style.display="none";
document.querySelector(".container").style.display="flex";
document.getElementById("vipBtn").style.display="flex";
}

/* PARTICULAS */
let c=document.getElementById("bg");
let ctx=c.getContext("2d");

function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let dots=[];
for(let i=0;i<40;i++){
dots.push({x:Math.random()*c.width,y:Math.random()*c.height,dx:Math.random()-0.5,dy:Math.random()-0.5});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="#00eaff";

dots.forEach(d=>{
ctx.beginPath();
ctx.arc(d.x,d.y,2,0,Math.PI*2);
ctx.fill();
d.x+=d.dx;
d.y+=d.dy;
});

requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
