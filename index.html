<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Piano Grande</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #111;
    color: white;
}

.piano {
    position: relative;
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

/* TECLAS BLANCAS */
.tecla {
    width: 50px;
    height: 250px;
    background: white;
    border: 1px solid black;
    cursor: pointer;
}

.tecla:active {
    background: #ccc;
}

/* TECLAS NEGRAS */
.negra {
    width: 30px;
    height: 150px;
    background: black;
    position: absolute;
    z-index: 2;
    cursor: pointer;
}

/* POSICIONES (muchas teclas) */
#cs1 { left: 135px; }
#ds1 { left: 185px; }
#fs1 { left: 285px; }
#gs1 { left: 335px; }
#as1 { left: 385px; }

#cs2 { left: 535px; }
#ds2 { left: 585px; }
#fs2 { left: 685px; }
#gs2 { left: 735px; }
#as2 { left: 785px; }

button {
    margin: 10px;
    padding: 10px;
}
</style>
</head>

<body>

<h1>🎹 Piano Grande</h1>
<p>Usá el teclado o hacé clic</p>

<div class="piano">
    <!-- OCTAVA 1 -->
    <div class="tecla" onclick="tocar(261.6)"></div>
    <div class="tecla" onclick="tocar(293.7)"></div>
    <div class="tecla" onclick="tocar(329.6)"></div>
    <div class="tecla" onclick="tocar(349.2)"></div>
    <div class="tecla" onclick="tocar(392.0)"></div>
    <div class="tecla" onclick="tocar(440.0)"></div>
    <div class="tecla" onclick="tocar(493.9)"></div>

    <!-- OCTAVA 2 -->
    <div class="tecla" onclick="tocar(523.3)"></div>
    <div class="tecla" onclick="tocar(587.3)"></div>
    <div class="tecla" onclick="tocar(659.3)"></div>
    <div class="tecla" onclick="tocar(698.5)"></div>
    <div class="tecla" onclick="tocar(784.0)"></div>
    <div class="tecla" onclick="tocar(880.0)"></div>
    <div class="tecla" onclick="tocar(987.8)"></div>

    <!-- NEGRAS -->
    <div class="negra" id="cs1" onclick="tocar(277.2)"></div>
    <div class="negra" id="ds1" onclick="tocar(311.1)"></div>
    <div class="negra" id="fs1" onclick="tocar(370.0)"></div>
    <div class="negra" id="gs1" onclick="tocar(415.3)"></div>
    <div class="negra" id="as1" onclick="tocar(466.2)"></div>

    <div class="negra" id="cs2" onclick="tocar(554.4)"></div>
    <div class="negra" id="ds2" onclick="tocar(622.2)"></div>
    <div class="negra" id="fs2" onclick="tocar(740.0)"></div>
    <div class="negra" id="gs2" onclick="tocar(830.6)"></div>
    <div class="negra" id="as2" onclick="tocar(932.3)"></div>
</div>

<script>
// SONIDO QUE SIEMPRE FUNCIONA
function tocar(freq) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.frequency.value = freq;
    osc.type = "sine";

    osc.start();

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        ctx.currentTime + 1.2
    );

    osc.stop(ctx.currentTime + 1.2);
}
</script>

</body>
</html>
