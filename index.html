
<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">

<!-- 🚫 BLOQUEO TOTAL DE ZOOM -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>SENCI PRO DE SALITA 2.O</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
color:white;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* 🔥 FONDO PRO GAMER */
body::before{
content:"";
position:fixed;
width:100%;height:100%;
background:
radial-gradient(circle at 20% 30%, rgba(255,0,0,0.3), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,0,0,0.2), transparent 40%),
linear-gradient(120deg,#000,#050000,#000);
animation:fondoMove 8s infinite alternate;
z-index:-1;
}

@keyframes fondoMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* 📦 CONTENEDOR PRO */
.container{
max-width:320px;
width:100%;
padding:10px;
border-radius:20px;
box-shadow:0 0 25px rgba(255,0,0,0.4);
background:rgba(10,0,0,0.8);
backdrop-filter:blur(10px);
}

/* 🔥 TITULO */
h1{
color:#ff2a2a;
font-size:16px;
text-align:center;
text-shadow:0 0 10px red;
}

/* TABS */
.tabs{
display:flex;
margin:10px 0;
}

.tab{
flex:1;
padding:6px;
font-size:11px;
text-align:center;
color:#aaa;
background:#111;
margin:2px;
border-radius:10px;
cursor:pointer;
}

.tab.active{
background:#ff0000;
color:#fff;
box-shadow:0 0 10px red;
}

/* INPUT */
input{
width:100%;
padding:6px;
margin:4px 0;
border:none;
border-radius:10px;
background:#111;
color:#fff;
text-align:center;
font-size:11px;
}

/* BOX */
.box{
background:#0a0000;
border:1px solid red;
border-radius:15px;
padding:10px;
}

/* LABELS */
.label{
display:flex;
justify-content:space-between;
font-size:11px;
margin-bottom:3px;
}

/* BARRAS */
input[type=range]{
pointer-events:none;
opacity:0.4;
}

/* VALORES */
.valor{
color:#ff2a2a;
font-size:18px;
text-shadow:0 0 8px red;
}

/* FOOTER */
.footer{
text-align:center;
font-size:10px;
color:#777;
margin-top:5px;
}

/* RESPONSIVE */
@media (max-width:600px){
.container{max-width:95%;}
}

</style>
</head>

<body>

<div class="container">

<h1>SENCI PRO DE SALITA 2.O</h1>

<div class="tabs">
<div class="tab active" onclick="setTab(this,'normal')">NORMAL</div>
<div class="tab" onclick="setTab(this,'premium')">ALTA</div>
<div class="tab" onclick="setTab(this,'inspirada')">MEDIA</div>
</div>

<input id="marca" placeholder="MARCA" oninput="calcular()">
<input id="modelo" placeholder="MODELO" oninput="calcular()">

<div class="box">

<div class="label">GENERAL <span id="general">0</span></div>
<input type="range" disabled>

<div class="label">MIRA DE PUNTO ROJO <span id="red">0</span></div>
<input type="range" disabled>

<div class="label">MIRA 2X <span id="x2">0</span></div>
<input type="range" disabled>

<div class="label">MIRA 4X <span id="x4">0</span></div>
<input type="range" disabled>

<div class="label">MIRA FRANCOTIRADOR <span id="awm">0</span></div>
<input type="range" disabled>

<div class="label">BOTON DE CAMARA 360º <span id="boton">0</span></div>
<input type="range" disabled>

</div>

<div class="label">DPI <span id="dpi">0</span></div>

<div class="footer">SENSI MARECHAL • AUTO AIM STYLE</div>

</div>

<script>
let tipoActual="normal";

function setTab(btn,tipo){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');
tipoActual=tipo;
calcular();
}

function calcular(){

let marca=document.getElementById('marca').value||"";
let modelo=document.getElementById('modelo').value||"";
let texto=marca+modelo;

let base=0;
for(let i=0;i<texto.length;i++){
base+=texto.charCodeAt(i)*(i+2);
}

/* 🔥 BASE MARECHAL MÁS ESTABLE */
base=(base%40)+20;

let mult=1;

/* MENOS EXAGERADO = MÁS PRECISO */
if(tipoActual==="premium") mult=1.10;
if(tipoActual==="inspirada") mult=0.95;

/* MICRO AJUSTE FINO */
let micro=(texto.length*3)%8;

let sens={
general:Math.floor((120+base+micro)*mult),
red:Math.floor((110+base+micro)*mult),
x2:Math.floor((95+base)*mult),
x4:Math.floor((130+base)*mult),
awm:Math.floor((100+base)*mult),
boton:Math.floor((50+base)*mult)
};

/* 🔒 SUAVIZADO PRO SIN RANDOM */
function suavizar(v){
return Math.floor(v*0.97);
}

for(let k in sens){sens[k]=suavizar(sens[k]);}

/* LIMITES */
function limitar(v,max){
return Math.max(1,Math.min(v,max));
}

sens.general=limitar(sens.general,200);
sens.red=limitar(sens.red,200);
sens.x2=limitar(sens.x2,200);
sens.x4=limitar(sens.x4,200);
sens.awm=limitar(sens.awm,200);
sens.boton=limitar(sens.boton,100);

/* APLICAR */
for(let k in sens){
document.getElementById(k).innerText=sens[k];
}

/* DPI PRO */
let dpi=400+(base*2);
dpi=Math.max(400,Math.min(dpi,600));
document.getElementById('dpi').innerText=dpi;

}
</script>

</body>
</html>
