<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- 🔒 SIN ZOOM -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>SENCI PRO</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: monospace;
  background: black;
  color: #00eaff;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CONTENEDOR */
.container {
  display: flex;
  gap: 12px;
  width: 95%;
  max-width: 800px;
}

/* PANEL */
.box, .resultado {
  width: 50%;
  padding: 18px;
  border: 2px solid #00eaff;
  background: black;
  box-shadow: 0 0 20px #00eaff;
}

/* RESULTADO */
.resultado {
  display: none;
}

/* INPUTS */
input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  background: black;
  border: 1px solid #00eaff;
  color: #00eaff;
}

/* BOTONES */
button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  background: black;
  border: 1px solid #00eaff;
  color: #00eaff;
  cursor: pointer;
  transition: 0.2s;
}

/* EFECTO AL TOCAR */
button:active {
  transform: scale(0.95);
  background: #00eaff;
  color: black;
  box-shadow: 0 0 15px #00eaff;
}

/* RANGO */
.range {
  display: flex;
  gap: 5px;
}

.range button.active {
  background: #00eaff;
  color: black;
}

/* LOADER */
#loader {
  display: none;
  margin-top: 10px;
}

/* Responsive */
@media (max-width: 600px) {
  .container {
    flex-direction: column;
  }
  .box, .resultado {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="container">

<!-- IZQUIERDA -->
<div class="box">

<h2>⚡ SENCI PRO SALITA</h2>

<input id="marca" placeholder="Marca del dispositivo">
<input id="modelo" placeholder="Modelo del dispositivo">

<div class="range">
  <button id="alta">ALTA</button>
  <button id="media">MEDIA</button>
  <button id="baja">BAJA</button>
</div>

<div id="loader">
  ⚡ GENERANDO...
  <div style="height:6px; background:#003; margin-top:8px;">
    <div id="bar" style="height:100%; width:0%; background:#00eaff;"></div>
  </div>
</div>

<button onclick="generar(true)">CON DPI</button>
<button onclick="generar(false)">SIN DPI</button>

</div>

<!-- DERECHA -->
<div class="resultado" id="resultado"></div>

</div>

<script>
let rango = "";

document.getElementById("alta").onclick = () => select("ALTA");
document.getElementById("media").onclick = () => select("MEDIA");
document.getElementById("baja").onclick = () => select("BAJA");

function select(r) {
  rango = r;
  document.querySelectorAll(".range button").forEach(b=>b.classList.remove("active"));
  document.getElementById(r.toLowerCase()).classList.add("active");
}

function generar(dpi) {
  let marca = document.getElementById("marca").value;
  let modelo = document.getElementById("modelo").value;

  if (!marca || !modelo || !rango) {
    alert("Completa todo");
    return;
  }

  const loader = document.getElementById("loader");
  const bar = document.getElementById("bar");
  const resultado = document.getElementById("resultado");

  loader.style.display = "block";
  resultado.style.display = "none";
  bar.style.width = "0%";

  let progreso = 0;

  let intervalo = setInterval(() => {
    progreso += 5;
    bar.style.width = progreso + "%";

    if (progreso >= 100) {
      clearInterval(intervalo);
      loader.style.display = "none";
      resultado.style.display = "block";

      let base = marca.length * modelo.length;
      let mult = rango === "ALTA" ? 1.15 : rango === "MEDIA" ? 1.05 : 0.95;

      function precision(min, max, peso) {
        let centro = (min + max) / 2;
        let variacion = (base % peso) - (peso / 2);
        let valor = centro + variacion * 0.3;
        return Math.round(Math.max(min, Math.min(valor, max)));
      }

      const sens = {
        general: precision(150, 190, 30) * mult,
        red: precision(120, 170, 20) * mult,
        x2: precision(110, 160, 18) * mult,
        x4: precision(100, 150, 15) * mult,
        boton: precision(45, 70, 10)
      };

      for (let key in sens) {
        sens[key] = Math.round(sens[key]);
      }

      resultado.innerHTML = `
=== SENCI GENERADA ===<br>
RANGO : ${rango}<br>
MODO : ${dpi ? "CON DPI" : "SIN DPI"}<br>
-----------------------<br>
DISPOSITIVO : ${modelo}<br>
MARCA : ${marca}<br>
-----------------------<br>
GENERAL : ${sens.general}%<br>
PUNTO ROJO : ${sens.red}%<br>
MIRA X2 : ${sens.x2}%<br>
MIRA X4 : ${sens.x4}%<br>
BOTON DISP : ${sens.boton}%<br>
DPI : ${dpi ? "411" : "DEFAULT"}<br>
🎯 HEADSHOT PRO
`;
    }
  }, 50);
}
</script>

</body>
</html>
