<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SENCI PRO SALITA</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
}

/* FONDO */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

/* CONTENEDOR */
.container{
display:flex;
gap:20px;
margin-top:40px;
align-items:flex-start;
justify-content:center;
flex-wrap:wrap;
position:relative;
z-index:10;
}

/* PANEL */
.panel, .resultPanel{
width:320px;
max-width:92vw;
padding:20px;
border:2px solid #00eaff;
box-shadow:0 0 20px #00eaff;
color:#00eaff;
background:#000;
border-radius:10px;
}

/* INPUTS MEJORADOS */
input{
width:100%;
padding:12px;
margin:8px 0;
background:#000;
border:2px solid #00eaff;
color:#00eaff;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

/* FILAS */
.row{
display:flex;
gap:5px;
}

/* BOTONES */
button{
flex:1;
padding:12px;
margin:5px 0;
background:#000;
border:2px solid #00eaff;
color:#00eaff;
cursor:pointer;
transition:0.2s;
border-radius:8px;
}

button:active{
transform:scale(0.95);
background:#00eaff;
color:#000;
}

button.active{
background:#00eaff;
color:#000;
}

/* DRAG */
.dragBtn{
border-color:red;
color:red;
}

/* VIP ARCOIRIS */
#vipBtn{
position:fixed;
top:50%;
right:10px;
transform:translateY(-50%);
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
z-index:9999;

background:linear-gradient(45deg, red, orange, yellow, lime, cyan, blue, violet, red);
background-size:400% 400%;
animation:rainbow 5s linear infinite;

color:#000;
border:none;
box-shadow:0 0 20px white;
}

@keyframes rainbow{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* RESULTADO */
#resultado{
line-height:1.6;
font-size:14px;
}

/* VIP PANEL */
#panelVIP{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:red;
z-index:99999;
padding:20px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="panel">
<h3>SENCI PRO SALITA</h3>

<input id="marca" placeholder="Marca del dispositivo">
<input id="modelo" placeholder="Modelo del dispositivo">

<div class="row">
<button onclick="setRango('ALTA',this)">ALTA</button>
<button onclick="setRango('MEDIA',this)">MEDIA</button>
<button onclick="setRango('BAJA',this)">BAJA</button>
</div>

<button onclick="activarDrag(this)" class="dragBtn">DRAG SHOT PRO</button>

<div class="row">
<button onclick="generar(true)">CON DPI</button>
<button onclick="generar(false)">SIN DPI</button>
</div>

</div>

<div class="resultPanel" id="resultado">
ESPERANDO DATOS...
</div>

</div>

<div id="vipBtn" onclick="abrirVIP()">VIP</div>

<div id="panelVIP">
<div id="vipResultado"></div>
</div>

<script>
let rango="ALTA";
let dragMode=false;

function setRango(r,btn){
rango=r;
document.querySelectorAll(".row button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function activarDrag(btn){
dragMode=!dragMode;
btn.classList.toggle("active");
}

function generar(dpi){

let marca=document.getElementById("marca").value;
let modelo=document.getElementById("modelo").value;
let resultado=document.getElementById("resultado");

let base=modelo.length*3 + Math.floor(Math.random()*10);

let sens={
general:180+base,
red:150+base,
x2:140+base,
x4:130+base,
franco:145+base,
boton:60+base
};

if(rango==="ALTA"){sens.general+=15;sens.red+=20;}
if(rango==="MEDIA"){sens.general+=5;}
if(rango==="BAJA"){sens.general-=10;}

if(dpi){sens.general+=5;}
if(dragMode){sens.red+=25;}

resultado.innerHTML=`
<b>📱 ${marca} ${modelo}</b><br>
<hr>

GENERAL: ${sens.general}<br>
MIRA DE PUNTO ROJO: ${sens.red}<br>
MIRA X2: ${sens.x2}<br>
MIRA X4: ${sens.x4}<br>
MIRA FRANCOTIRADOR: ${sens.franco}<br>
BOTÓN DE CAMARA 360°: ${sens.boton}
`;
}

/* VIP */
function abrirVIP(){
let p=prompt("Clave:");

if(p==="22"){
document.querySelector(".container").style.display="none";
document.getElementById("vipBtn").style.display="none";

let panelVIP=document.getElementById("panelVIP");
panelVIP.style.display="block";

document.getElementById("vipResultado").innerHTML=`
<h2>💀 VIP PRO 💀</h2>

GENERAL: 200<br>
MIRA DE PUNTO ROJO: 190<br>
MIRA X2: 180<br>
MIRA X4: 170<br>
MIRA FRANCOTIRADOR: 195<br>
BOTÓN DE CAMARA 360°: 80<br>

<br>
<button onclick="cerrarVIP()">SALIR</button>
`;
}else{
alert("Clave incorrecta");
}
}

function cerrarVIP(){
document.getElementById("panelVIP").style.display="none";
document.querySelector(".container").style.display="flex";
document.getElementById("vipBtn").style.display="flex";
}

/* FONDO */
let c=document.getElementById("bg");
let ctx=c.getContext("2d");

function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let dots=[];
for(let i=0;i<40;i++){
dots.push({x:Math.random()*c.width,y:Math.random()*c.height,dx:Math.random()-0.5,dy:Math.random()-0.5});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="#00eaff";

dots.forEach(d=>{
ctx.beginPath();
ctx.arc(d.x,d.y,2,0,Math.PI*2);
ctx.fill();
d.x+=d.dx;
d.y+=d.dy;
});

requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
