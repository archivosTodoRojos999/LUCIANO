<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador Sensi Pro Max</title>
  <style>
    body {
      margin: 0;
      font-family: monospace;
      color: #a855f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: black;
      background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: 320px;
    }

    .box {
      padding: 20px;
      width: 350px;
      border: 2px solid #PURPLE;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      box-shadow: 0 0 10px #a855f7, 0 0 20px #9333ea, 0 0 40px #7e22ce;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: black;
      color: #a855f7;
      border: 1px solid #a855f7;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #a855f7;
      background: black;
      color: #a855f7;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #a855f7;
      color: black;
    }

    .error {
      color: red;
      margin-top: 10px;
    }

    .result {
      margin-top: 15px;
      font-size: 14px;
    }

    .headshot {
      margin-top: 15px;
      text-align: center;
      padding: 10px;
      border: 1px solid #a855f7;
      box-shadow: 0 0 10px #a855f7;
    }
  </style>
</head>
<body>

<div class="box">
  <h2 style="text-align:center;">SENSI PRO MAX DE SALITA</h2>

  <input id="device" placeholder="Ej: Samsung A51, iPhone 11">

  <button onclick="generate()">GENERAR SENSI</button>

  <p id="error" class="error"></p>

  <div id="sens" class="result"></div>

  <div id="headshot" class="headshot" style="display:none;"></div>
</div>

<script>
  function generate() {
    const device = document.getElementById("device").value;
    const errorEl = document.getElementById("error");
    const sensEl = document.getElementById("sens");
    const headshotEl = document.getElementById("headshot");

    if (!device.trim()) {
      errorEl.textContent = "Escribe tu dispositivo";
      sensEl.innerHTML = "";
      headshotEl.style.display = "none";
      return;
    }

    errorEl.textContent = "";

    let hash = 0;
    for (let i = 0; i < device.length; i++) {
      hash = device.charCodeAt(i) + ((hash << 5) - hash);
    }

    const base = Math.abs(hash);

    const calc = (min, max, factor) => {
      let value = min + (base % factor);
      value = Math.max(min, Math.min(value, max));
      return value;
    };

    const sens = {
      general: calc(120, 200, 80),
      redDot: calc(90, 180, 70),
      x2: calc(80, 170, 60),
      x4: calc(70, 160, 50),
      sniper: calc(60, 150, 40),
      freeLook: calc(100, 200, 100),
    };

    sensEl.innerHTML = `
      <p>GENERAL: ${sens.general}</p>
      <p>PUNTO ROJO: ${sens.redDot}</p>
      <p>MIRA X2: ${sens.x2}</p>
      <p>MIRA X4: ${sens.x4}</p>
      <p>FRANCOTIRADOR: ${sens.sniper}</p>
      <p>CAMARA 360: ${sens.freeLook}</p>
    `;

    let precision = Math.floor((sens.general + sens.redDot + sens.freeLook) / 5);
    if (precision < 99) precision = 99;
    if (precision > 100) precision = 100;

    headshotEl.style.display = "block";
    headshotEl.innerHTML = 🎯 HEADSHOT PRECISION: ${precision}%;
  }
</script>

</body>
</html>
