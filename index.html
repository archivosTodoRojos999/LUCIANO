<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sobrevivir a la Escuela Marcelino Blanco</title>

<style>

html,body{
height:100%;
overflow:hidden;
}

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
animation:desaparecer 3s 3s forwards;
}

#logoIntro{
font-size:42px;
font-weight:bold;
animation:zoomLogo 3s;
}

@keyframes zoomLogo{
0%{transform:scale(0.3);opacity:0}
100%{transform:scale(1);opacity:1}
}

@keyframes desaparecer{
to{opacity:0;visibility:hidden}
}

h1{
padding:10px;
font-size:34px;
}

/* VIDEO */

#video{
width:900px;
max-width:90%;
margin:auto;
position:relative;
}

#imagen{
width:100%;
height:450px;
object-fit:cover;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transition:opacity 1s, transform 6s;
}

#subtitulo{
position:absolute;
bottom:20px;
left:0;
right:0;
font-size:22px;
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:8px;
}

/* LOGO ARREGLADO */

#logoEscuela{
position:absolute;
top:10px;
left:10px;
display:flex;
align-items:center;
gap:10px;
background:rgba(0,0,0,0.6);
padding:6px 12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.5);
}

#logoEscuela img{
width:45px;
height:45px;
object-fit:cover;
border-radius:8px;
}

#logoEscuela span{
font-size:16px;
font-weight:bold;
}

/* BOTON */

button{
margin-top:20px;
padding:14px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00c3ff,#4facfe);
cursor:pointer;
color:white;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

button:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<!-- INTRO -->
<div id="intro">
<div id="logoIntro">🏫 Escuela Marcelino Blanco</div>
<p>Presenta</p>
</div>

<h1>¡Sobrevivir a la Escuela Marcelino Blanco!</h1>

<div id="video">

<div id="logoEscuela">
<img src="logo.png">
<span>Marcelino Blanco</span>
</div>

<img id="imagen" src="https://images.unsplash.com/photo-1580582932707-520aed937b7b">

<div id="subtitulo">
Presiona iniciar para comenzar el video
</div>

</div>

<button onclick="iniciar()">▶ Iniciar video</button>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

let imagenes=[

"https://images.unsplash.com/photo-1580582932707-520aed937b7b",
"https://images.unsplash.com/photo-1596495578065-6e0763fa1178",
"https://images.unsplash.com/photo-1503676260728-1c00da094a0b",
"https://images.unsplash.com/photo-1509062522246-3755977927d7",
"https://images.unsplash.com/photo-1523240795612-9a054b0db644",
"https://images.unsplash.com/photo-1577896851231-70ef18881754"

];

let textos=[

"Hola chicos, bienvenidos a la escuela Marcelino Blanco. Soy Luciano Sala y estoy aquí para ayudarlos a comenzar este nuevo año.",

"La escuela es como un juego. Tendrán desafíos, harán amigos y aprenderán muchas cosas nuevas.",

"No se preocupen si al principio no saben todo. Eso es parte de estar en primer año.",

"Algunos consejos para sobrevivir: no tengan miedo de preguntar, hagan amigos y trabajen en equipo.",

"Recuerden que la escuela es un lugar para aprender, crecer y divertirse.",

"Buena suerte chicos. Vamos a hacer que este año sea inolvidable."

];

let i=0;

function iniciar(){

let musica=document.getElementById("musica");

musica.volume=0;
musica.play();

/* subir volumen suave */

let subirVolumen=setInterval(()=>{
if(musica.volume<0.25){
musica.volume+=0.02;
}else{
clearInterval(subirVolumen);
}
},200);

cambiarImagen();

leerTodo();

}

function cambiarImagen(){

let img=document.getElementById("imagen");

img.style.opacity=0;

setTimeout(()=>{

img.src=imagenes[i];

document.getElementById("subtitulo").innerText=textos[i];

img.style.opacity=1;

img.style.transform="scale(1.1)";

setTimeout(()=>{
img.style.transform="scale(1)";
},2500);

i++;

if(i<imagenes.length){

setTimeout(cambiarImagen,5000);

}

},500);

}

function leerTodo(){

speechSynthesis.cancel();

let textoCompleto = textos.join(" ");

let voz=new SpeechSynthesisUtterance(textoCompleto);

voz.lang="es-ES";

/* VOZ MÁS FLUIDA */

voz.rate=0.85;
voz.pitch=1;
voz.volume=1;

speechSynthesis.speak(voz);

}

</script>

</body>
</html>
