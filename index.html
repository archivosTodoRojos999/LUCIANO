<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calculadora Científica Móvil</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background-color: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .calculator {
    background-color: #333;
    border-radius: 10px;
    padding: 10px;
    width: 95%;
    max-width: 400px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }

  #display {
    background-color: #000;
    color: #0f0;
    font-size: 2em;
    padding: 10px;
    border-radius: 5px;
    margin-bottom: 10px;
    min-height: 50px;
    text-align: right;
    word-wrap: break-word;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  button {
    font-size: 1.2em;
    padding: 15px;
    border: none;
    border-radius: 8px;
    background-color: #555;
    color: #fff;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover {
    background-color: #777;
  }
</style>
</head>
<body>

<div class="calculator">
  <div id="display">0</div>
  <div class="buttons">
    <button onclick="clearDisplay()">C</button>
    <button onclick="toggleSign()">±</button>
    <button onclick="calculate('sin')">sin</button>
    <button onclick="calculate('cos')">cos</button>

    <button onclick="appendNumber('7')">7</button>
    <button onclick="appendNumber('8')">8</button>
    <button onclick="appendNumber('9')">9</button>
    <button onclick="calculate('/')">/</button>

    <button onclick="appendNumber('4')">4</button>
    <button onclick="appendNumber('5')">5</button>
    <button onclick="appendNumber('6')">6</button>
    <button onclick="calculate('*')">*</button>

    <button onclick="appendNumber('1')">1</button>
    <button onclick="appendNumber('2')">2</button>
    <button onclick="appendNumber('3')">3</button>
    <button onclick="calculate('-')">-</button>

    <button onclick="appendNumber('0')">0</button>
    <button onclick="appendNumber('.')">.</button>
    <button onclick="calculate('^')">^</button>
    <button onclick="calculate('+')">+</button>

    <button onclick="calculate('sqrt')">√</button>
    <button onclick="calculate('log')">log</button>
    <button onclick="calculate('tan')">tan</button>
    <button onclick="calculate('')">=</button>
  </div>
</div>

<script>
let currentInput = '';
let lastOperator = '';
let lastNumber = '';
let resultDisplayed = false;

const display = document.getElementById('display');

function updateDisplay() {
  if(currentInput === '') {
    display.innerText = '0';
  } else {
    display.innerText = currentInput;
  }
}

function appendNumber(num) {
  if(resultDisplayed) {
    currentInput = '';
    resultDisplayed = false;
  }
  currentInput += num;
  updateDisplay();
}

function clearDisplay() {
  currentInput = '';
  lastOperator = '';
  lastNumber = '';
  resultDisplayed = false;
  updateDisplay();
}

function toggleSign() {
  if(currentInput.startsWith('-')) {
    currentInput = currentInput.substring(1);
  } else if(currentInput !== '') {
    currentInput = '-' + currentInput;
  }
  updateDisplay();
}

function calculate(func) {
  if(func === 'sin' || func === 'cos' || func === 'tan' || func === 'log' || func === 'sqrt') {
    // Funciones trig y log
    let num = parseFloat(currentInput);
    if(isNaN(num)) return;
    let res = 0;
    switch(func) {
      case 'sin': res = Math.sin(toRadians(num)); break;
      case 'cos': res = Math.cos(toRadians(num)); break;
      case 'tan': res = Math.tan(toRadians(num)); break;
      case 'log': res = Math.log10(num); break;
      case 'sqrt': res = Math.sqrt(num); break;
    }
    currentInput = res.toString();
    updateDisplay();
    resultDisplayed = true;
  } else if(func === '^') {
    lastNumber = currentInput;
    lastOperator = '^';
    currentInput = '';
  } else if(func === 'log') {
    let num = parseFloat(currentInput);
    if(!isNaN(num) && num>0) {
      currentInput = Math.log10(num).toString();
      updateDisplay();
      resultDisplayed = true;
    }
  } else if(func === '') {
    // Igual
    if(lastOperator && lastNumber !== '' && currentInput !== '') {
      const num1 = parseFloat(lastNumber);
      const num2 = parseFloat(currentInput);
      let res = 0;
      switch(lastOperator) {
        case '+': res = num1 + num2; break;
        case '-': res = num1 - num2; break;
        case '*': res = num1 * num2; break;
        case '/': res = num2 !== 0 ? num1 / num2 : 'Error'; break;
        case '^': res = Math.pow(num1, num2); break;
      }
      currentInput = res.toString();
      updateDisplay();
      lastOperator = '';
      lastNumber = '';
      resultDisplayed = true;
    }
  } else {
    // Operador
    if(currentInput === '') return;
    if(lastOperator !== '') {
      // Calculamos previo
      calculate('');
    }
    lastNumber = currentInput;
    lastOperator = func;
    currentInput = '';
  }
}

// Función para convertir grados a radianes
function toRadians(deg) {
  return deg * Math.PI / 180;
}
</script>

</body>
</html>
